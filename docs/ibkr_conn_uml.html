<!doctype html>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>ibkr_conn — Architecture Diagram</title>
<style>
  :root {
    color-scheme: light dark;
    --bg: #f8fafc;
    --fg: #172033;
    --muted: #5b6475;
    --line: #64748b;
    --neutral: #e2e8f0;
    --input: #bfdbfe;
    --process: #c7d2fe;
    --storage: #99f6e4;
    --external: #fde68a;
    --risk: #fecaca;
    --dto: #c4b5fd;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f172a;
      --fg: #e5e7eb;
      --muted: #a3adbd;
      --line: #94a3b8;
      --neutral: #334155;
      --input: #1d4ed8;
      --process: #4338ca;
      --storage: #0f766e;
      --external: #92400e;
      --risk: #991b1b;
      --dto: #5b21b6;
    }
  }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--fg);
    font: 14px/1.4 ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }
  main {
    max-width: 1140px;
    margin: 32px auto;
    padding: 0 20px;
  }
  svg {
    width: 100%;
    height: auto;
    display: block;
  }
  .title    { font-size: 20px; font-weight: 650; fill: var(--fg); }
  .subtitle { font-size: 13px; fill: var(--muted); }
  .label    { font-size: 13px; font-weight: 600; fill: var(--fg); }
  .small    { font-size: 11px; fill: var(--muted); }
  .method   { font-size: 10px; fill: var(--muted); }
  .node     { stroke: var(--line); stroke-width: 1; rx: 6; ry: 6; }
  .neutral  { fill: var(--neutral); }
  .input    { fill: var(--input); }
  .process  { fill: var(--process); }
  .storage  { fill: var(--storage); }
  .external { fill: var(--external); }
  .risk     { fill: var(--risk); }
  .dto      { fill: var(--dto); }
  .edge     { stroke: var(--line); stroke-width: 1.5; fill: none; }
  .dashed   { stroke: var(--line); stroke-width: 1.5; fill: none; stroke-dasharray: 5 4; }
  .zone     { fill: none; stroke: var(--line); stroke-width: 1; stroke-dasharray: 6 5; opacity: 0.7; }
</style>
<main>
<svg viewBox="0 0 1100 920" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 Z" fill="var(--line)"/>
    </marker>
    <marker id="arrow-dashed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 Z" fill="var(--line)"/>
    </marker>
  </defs>

  <!-- ── Title ── -->
  <text x="550" y="30" text-anchor="middle" class="title">ibkr_conn — Module Architecture</text>
  <text x="550" y="48" text-anchor="middle" class="subtitle">8 Python modules · 3 zones · data_record.py typed DTOs · Singleton SessionManager</text>

  <!-- ═══════════════════════════════════════════════════════════════════════════
       Zone 1: CLI Entry  (Y: 70–200)
       ═══════════════════════════════════════════════════════════════════════════ -->
  <rect x="30"  y="70"  width="1040" height="140" class="zone"/>
  <text x="40" y="87" class="small" fill="var(--line)">CLI Entry</text>

  <!-- run_service.py -->
  <rect x="50"   y="105" width="220" height="90" class="node input"/>
  <text x="160"  y="127" text-anchor="middle" class="label">run_service.py</text>
  <text x="160"  y="143" text-anchor="middle" class="small">CLI entry point</text>
  <text x="60"   y="161" class="method">main()</text>
  <text x="60"   y="175" class="method">build_ibkr_parser()</text>
  <text x="60"   y="189" class="method">_handle_status()</text>

  <!-- ── divider ── -->
  <text x="550" y="227" text-anchor="middle" class="subtitle">▼ dispatches to</text>

  <!-- ═══════════════════════════════════════════════════════════════════════════
       Zone 2: Application Logic  (Y: 240–610)
       ═══════════════════════════════════════════════════════════════════════════ -->
  <rect x="30"  y="240" width="1040" height="380" class="zone"/>
  <text x="40" y="257" class="small" fill="var(--line)">Application Logic</text>

  <!-- ── Row 1 (Y: 270) ── -->

  <!-- session_manager.py -->
  <rect x="50"   y="270" width="250" height="155" class="node process"/>
  <text x="175"  y="292" text-anchor="middle" class="label">session_manager.py  🔒 Singleton</text>
  <text x="175"  y="310" text-anchor="middle" class="small">SessionManager — owns IB + QuestDB</text>
  <text x="60"   y="329" class="method">get_instance()  (Singleton)</text>
  <text x="60"   y="343" class="method">get_ib_conn()  (6×5s internal retry)</text>
  <text x="60"   y="357" class="method">get_questdb() → QuestDBManager</text>
  <text x="60"   y="371" class="method">on_error()  (signal connection death)</text>
  <text x="60"   y="385" class="method">start_gateway() / stop_gateway()</text>
  <text x="60"   y="399" class="method">get_status() · keepalive · PID locks</text>
  <text x="60"   y="413" class="method">→ IBConnectionFatalError (6 fails)</text>

  <!-- data_downloader.py -->
  <rect x="350" y="270" width="250" height="155" class="node neutral"/>
  <text x="475"  y="292" text-anchor="middle" class="label">data_downloader.py  📦 Client</text>
  <text x="475"  y="310" text-anchor="middle" class="small">DataDownloader — uses SessionManager</text>
  <text x="360"  y="329" class="method">__init__() → SessionManager()</text>
  <text x="360"  y="343" class="method">download_bars()  (error recovery)</text>
  <text x="360"  y="357" class="method">start_streaming()</text>
  <text x="360"  y="371" class="method">stream_ticks()  (keepalive loop)</text>
  <text x="360"  y="385" class="method">_load_tick_config()</text>
  <text x="360"  y="399" class="method">_ensure_gateway_ready()</text>
  <text x="360"  y="413" class="method">→ HistBarData / FutureTickData</text>

  <!-- utils.py -->
  <rect x="650" y="270" width="200" height="155" class="node neutral"/>
  <text x="750"  y="292" text-anchor="middle" class="label">utils.py</text>
  <text x="750"  y="310" text-anchor="middle" class="small">Shared utilities (no connections)</text>
  <text x="660"  y="329" class="method">build_ric_contract()</text>
  <text x="660"  y="343" class="method">resolve_contracts()</text>
  <text x="660"  y="357" class="method">get_contract()</text>
  <text x="660"  y="371" class="method">parse_date_range()</text>
  <text x="660"  y="385" class="method">_month_map()</text>

  <!-- ── Row 2 (Y: 460) ── -->

  <!-- ibgateway.py -->
  <rect x="50"   y="460" width="250" height="140" class="node process"/>
  <text x="175"  y="482" text-anchor="middle" class="label">ibgateway.py</text>
  <text x="175"  y="500" text-anchor="middle" class="small">Gateway lifecycle (no ib_insync)</text>
  <text x="60"   y="519" class="method">start_gateway()</text>
  <text x="60"   y="533" class="method">stop_gateway()</text>
  <text x="60"   y="547" class="method">ensure_gateway()  (via SessionManager)</text>
  <text x="60"   y="561" class="method">wait_for_api()  (via SessionManager)</text>
  <text x="60"   y="575" class="method">generate_config_ini()</text>
  <text x="60"   y="589" class="method">gateway_status() · get_credentials()</text>

  <!-- questdb.py -->
  <rect x="350" y="460" width="250" height="140" class="node process"/>
  <text x="475"  y="482" text-anchor="middle" class="label">questdb.py</text>
  <text x="475"  y="500" text-anchor="middle" class="small">QuestDBManager — OO ILP writer</text>
  <text x="360"  y="519" class="method">QuestDBManager  (class)</text>
  <text x="360"  y="533" class="method">send_ilp_batch()</text>
  <text x="360"  y="547" class="method">write_bars()</text>
  <text x="360"  y="561" class="method">write_ticks()</text>
  <text x="360"  y="575" class="method">is_port_open() · is_questdb_running()</text>
  <text x="360"  y="589" class="method">start_questdb() / stop_questdb()</text>

  <!-- ── divider ── -->
  <text x="550" y="637" text-anchor="middle" class="subtitle">▼ external dependencies</text>

  <!-- ═══════════════════════════════════════════════════════════════════════════
       Zone 3: External Dependencies  (Y: 650–800)
       ═══════════════════════════════════════════════════════════════════════════ -->
  <rect x="30"  y="650" width="1040" height="160" class="zone"/>
  <text x="40" y="667" class="small" fill="var(--line)">External Dependencies</text>

  <!-- IB Gateway -->
  <rect x="50"   y="690" width="220" height="90" class="node external"/>
  <text x="160"  y="715" text-anchor="middle" class="label">IB Gateway (TWS)</text>
  <text x="160"  y="735" text-anchor="middle" class="small">TCP :4002</text>
  <text x="60"   y="755" class="method">ib_insync library</text>
  <text x="60"   y="769" class="method">IBC controller</text>

  <!-- QuestDB Server -->
  <rect x="340" y="690" width="250" height="90" class="node storage"/>
  <text x="465"  y="715" text-anchor="middle" class="label">QuestDB Server</text>
  <text x="465"  y="735" text-anchor="middle" class="small">HTTP :9000 / ILP :9009</text>
  <text x="350"  y="755" class="method">futures_hist table</text>
  <text x="350"  y="769" class="method">futures_tick table</text>

  <!-- CSV File System -->
  <rect x="650" y="690" width="200" height="90" class="node storage"/>
  <text x="750"  y="715" text-anchor="middle" class="label">CSV File System</text>
  <text x="750"  y="735" text-anchor="middle" class="small">Data directory</text>
  <text x="660"  y="755" class="method">bars CSV export</text>

  <!-- ═══════════════════════════════════════════════════════════════════════════
       Vertical panels (right side): data_record.py + logger.py
       ═══════════════════════════════════════════════════════════════════════════ -->

  <!-- data_record.py -->
  <rect x="900" y="105" width="140" height="120" class="node dto" rx="8" ry="8"/>
  <text x="910" y="125" text-anchor="middle" class="label">data_record.py</text>
  <text x="910" y="145" text-anchor="middle" class="small">Typed DTOs (NamedTuples)</text>
  <text x="910" y="163" text-anchor="middle" class="method">HistBarData</text>
  <text x="910" y="178" text-anchor="middle" class="method">FutureTickData</text>
  <text x="910" y="195" text-anchor="middle" class="method">(immutable, no deps)</text>

  <!-- logger.py -->
  <rect x="900" y="250" width="140" height="430" class="node neutral" rx="8" ry="8"/>
  <text x="910" y="270" text-anchor="middle" class="label">logger.py</text>
  <text x="910" y="290" text-anchor="middle" class="small">Singleton structured logger + rotation</text>
  <text x="910" y="460" text-anchor="middle" class="method" transform="rotate(-90,840,460)" style="writing-mode:tb">get_logger() · configure_pipeline_logging()</text>

  <!-- IB() Guard Rule -->
  <rect x="650" y="460" width="200" height="140" class="node risk"/>
  <text x="750"  y="485" text-anchor="middle" class="label">🔐 IB() Guard Rule</text>
  <text x="750"  y="505" text-anchor="middle" class="small">Only session_manager.py</text>
  <text x="750"  y="520" text-anchor="middle" class="small">may construct ib_insync.IB()</text>
  <text x="750"  y="540" text-anchor="middle" class="small">or call ib.connect().</text>
  <text x="750"  y="560" text-anchor="middle" class="small">Enforceable via:</text>
  <text x="750"  y="580" text-anchor="middle" class="method">grep -rn "IB()" --include="*.py" . | grep -v venv</text>

  <!-- ═══════════════════════════════════════════════════════════════════════════
       Edges
       ═══════════════════════════════════════════════════════════════════════════ -->

  <!-- run_service.py → data_downloader.py -->
  <path d="M 270 150 L 330 150 L 330 340 L 350 340" class="edge" marker-end="url(#arrow)"/>

  <!-- data_downloader.py → data_record.py (DTO imports) -->
  <path d="M 600 395 L 890 395 L 890 225" class="edge" marker-end="url(#arrow)"/>

  <!-- data_downloader.py → questdb.py -->
  <path d="M 475 425 L 475 460" class="edge" marker-end="url(#arrow)"/>

  <!-- session_manager.py → ibgateway.py -->
  <path d="M 175 425 L 175 460" class="edge" marker-end="url(#arrow)"/>

  <!-- session_manager.py → questdb.py -->
  <path d="M 300 500 L 350 500" class="edge" marker-end="url(#arrow)"/>

  <!-- ibgateway.py → IB Gateway -->
  <path d="M 175 600 L 175 655 L 160 655 L 160 690" class="edge" marker-end="url(#arrow)"/>

  <!-- ibgateway.py → session_manager.py (ensure_gateway back-ref) -->
  <path d="M 250 520 L 320 520 L 320 300 L 300 300" class="edge" marker-end="url(#arrow)"/>

  <!-- questdb.py → QuestDB Server -->
  <path d="M 465 600 L 465 655 L 465 690" class="edge" marker-end="url(#arrow)"/>

  <!-- data_downloader.py → CSV -->
  <path d="M 600 415 L 630 415 L 630 725 L 650 725" class="edge" marker-end="url(#arrow)"/>

  <!-- session_manager.py → IB Gateway -->
  <path d="M 45 450 L 20 450 L 20 735 L 50 735" class="edge" marker-end="url(#arrow)"/>

  <!-- run_service.py → logger.py -->
  <path d="M 270 120 L 890 120" class="edge" marker-end="url(#arrow)"/>

  <!-- logger.py → all modules (dashed) -->

  <path d="M 900 570 L 890 570" class="dashed" marker-end="url(#arrow-dashed)"/>

  <!-- Legend -->
  <rect x="50"  y="845" width="12" height="12" class="node input" />
  <text x="66" y="855" class="small">CLI Entry</text>

  <rect x="150" y="845" width="12" height="12" class="node process" />
  <text x="166" y="855" class="small">Application</text>

  <rect x="270" y="845" width="12" height="12" class="node neutral" />
  <text x="286" y="855" class="small">Library</text>

  <rect x="370" y="845" width="12" height="12" class="node external" />
  <text x="386" y="855" class="small">External</text>

  <rect x="470" y="845" width="12" height="12" class="node storage" />
  <text x="486" y="855" class="small">Storage</text>

  <rect x="570" y="845" width="12" height="12" class="node risk" />
  <text x="586" y="855" class="small">Constraint</text>

  <rect x="700" y="845" width="12" height="12" class="node dto" />
  <text x="716" y="855" class="small">DTOs</text>

  <line x1="800" y1="851" x2="830" y2="851" class="edge" />
  <text x="836" y="855" class="small">Import</text>

  <line x1="900" y1="851" x2="930" y2="851" class="dashed" />
  <text x="936" y="855" class="small">Logging</text>

</svg>
</main>
